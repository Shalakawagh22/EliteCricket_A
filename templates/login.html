<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<header>

<div class="logo">Cricket Academy</div>

<nav>
<a href="/register">Register</a>
<a href="#">Enroll</a>
<a href="#">Contact Us</a>
</nav>

</header>


<div class="auth-container">

<form method="POST" class="auth-form" {% with messages = get_flashed_messages() %}
  {% if messages %}
    <div class="error">
      {% for msg in messages %}
        <p>{{ msg }}</p>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %} >
    

<h2>Login</h2>

<input type="email" name="email" placeholder="Email Address" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

<p>Don't have account? <a href="/register">Register</a></p>

</form>

</div>


<footer>
<p>© 2026 Cricket Academy | All Rights Reserved</p>
</footer>

</body>
</html>
