<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Coach - Elite Cricket Academy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --secondary: #3b82f6;
            --danger: #ef4444;
            --text-dark: #1f2937;
            --text-muted: #6b7280;
            --bg: #f0fdf4;
            --surface: #ffffff;
            --border: #e5e7eb;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: var(--text-dark);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        @keyframes msgIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes blink {
            0%, 80%, 100% { opacity: 0.2; }
            40%           { opacity: 1; }
        }

        /* ── TOP NAV ── */
        .topbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .topbar .logo {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .topbar nav { display: flex; gap: 16px; align-items: center; }

        .topbar nav a {
            text-decoration: none;
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 500;
            transition: color 0.2s;
        }

        .topbar nav a:hover { color: var(--primary); }

        .topbar nav a.btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 7px 16px;
            border-radius: 8px;
            font-weight: 600;
        }

        /* ── LAYOUT: sidebar + chat ── */
        .layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ── LEFT SIDEBAR ── */
        .sidebar {
            width: 260px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px 16px;
            gap: 8px;
            flex-shrink: 0;
        }

        .sidebar-title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 4px;
            padding: 0 4px;
        }

        .chip {
            background: rgba(16,185,129,0.07);
            border: 1px solid rgba(16,185,129,0.2);
            color: var(--primary-dark);
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            font-family: 'Poppins', sans-serif;
            width: 100%;
        }

        .chip:hover {
            background: rgba(16,185,129,0.15);
            transform: translateX(4px);
        }

        .sidebar-divider {
            height: 1px;
            background: var(--border);
            margin: 8px 0;
        }

        .clear-side {
            margin-top: auto;
            background: rgba(239,68,68,0.07);
            border: 1px solid rgba(239,68,68,0.2);
            color: var(--danger);
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            width: 100%;
            transition: background 0.2s;
        }

        .clear-side:hover { background: rgba(239,68,68,0.14); }

        /* ── CHAT AREA ── */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Chat header */
        .chat-header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .bot-avatar {
            width: 42px;
            height: 42px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .bot-info .name { font-size: 15px; font-weight: 700; color: white; }
        .bot-info .status { font-size: 12px; color: rgba(255,255,255,0.75); }

        /* Messages */
        .chatbox {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: var(--bg);
        }

        .chatbox::-webkit-scrollbar { width: 5px; }
        .chatbox::-webkit-scrollbar-thumb { background: #c7f0e0; border-radius: 10px; }

        .msg-row {
            display: flex;
            align-items: flex-end;
            gap: 8px;
        }

        .msg-row.user { flex-direction: row-reverse; }

        .msg-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .msg-row.bot .msg-avatar  { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); }
        .msg-row.user .msg-avatar { background: linear-gradient(135deg, #6366f1, #4f46e5); }

        .bubble {
            max-width: 62%;
            padding: 11px 15px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.6;
            animation: msgIn 0.3s ease-out;
            word-wrap: break-word;
        }

        .msg-row.bot .bubble {
            background: var(--surface);
            color: var(--text-dark);
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            border-left: 3px solid var(--primary);
        }

        .msg-row.user .bubble {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border-bottom-right-radius: 4px;
            font-weight: 500;
        }

        /* Typing dots */
        .typing { display: flex; gap: 4px; align-items: center; padding: 4px 2px; }
        .typing span {
            width: 7px; height: 7px;
            background: var(--primary);
            border-radius: 50%;
            animation: blink 1.2s infinite;
        }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        /* ── INPUT BAR ── */
        .input-bar {
            background: var(--surface);
            border-top: 1px solid var(--border);
            padding: 12px 16px;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-shrink: 0;
        }

        #message {
            flex: 1;
            padding: 11px 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            outline: none;
            background: var(--bg);
            color: var(--text-dark);
            transition: border-color 0.25s, box-shadow 0.25s;
        }

        #message:focus {
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 3px rgba(16,185,129,0.1);
        }

        #message::placeholder { color: var(--text-muted); }

        .icon-btn {
            width: 44px;
            height: 44px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, box-shadow 0.2s;
            flex-shrink: 0;
        }

        .icon-btn:hover { transform: translateY(-2px); }

        .btn-send  { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; box-shadow: 0 4px 12px rgba(16,185,129,0.3); }
        .btn-voice { background: linear-gradient(135deg, var(--secondary), #2563eb); color: white; }
        .btn-voice.listening { background: linear-gradient(135deg, var(--danger), #dc2626); animation: blink 0.8s infinite; }
        .btn-stop  { background: #f3f4f6; color: var(--text-muted); }

        @media (max-width: 700px) {
            .sidebar { display: none; }
            .bubble { max-width: 85%; }
        }
    </style>
</head>
<body>

<!-- TOP NAV -->
<div class="topbar">
    <div class="logo"><a href="/dashboard_user" style="text-decoration:none;"><img src="/static/images/logo.png" alt="Elite Cricket Academy" style="height:48px; width:auto; object-fit:contain;"></a></div>
    <nav>
        <a href="/dashboard_user">Home</a>
        <a href="/gamezone">Games</a>
        <a href="/store">Shop</a>
        <a href="/logout" class="btn">Logout</a>
    </nav>
</div>

<!-- LAYOUT -->
<div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="sidebar-title">Quick Questions</div>

        <button class="chip" onclick="ask('How to improve batting?')">🏏 Batting tips</button>
        <button class="chip" onclick="ask('Best bowling techniques?')">🎳 Bowling tips</button>
        <button class="chip" onclick="ask('Fitness tips for cricket?')">💪 Fitness advice</button>
        <button class="chip" onclick="ask('How to improve fielding?')">🏃 Fielding tips</button>
        <button class="chip" onclick="ask('Wicket keeping tips?')">🧤 Wicket keeping</button>
        <button class="chip" onclick="ask('Cricket diet and nutrition?')">🥗 Nutrition</button>
        <button class="chip" onclick="ask('How to handle pressure in cricket?')">🧠 Mental game</button>

        <div class="sidebar-divider"></div>

        <button class="chip" onclick="ask('Tell me about Elite Cricket Academy programs')">🎓 Our Programs</button>
        <button class="chip" onclick="ask('How to enroll in the academy?')">📋 How to Enroll</button>

        <button class="clear-side" onclick="clearChat()">🗑 Clear Chat</button>
    </div>

    <!-- CHAT AREA -->
    <div class="chat-area">

        <!-- Header -->
        <div class="chat-header">
            <div class="bot-avatar">🤖</div>
            <div class="bot-info">
                <div class="name">AI Cricket Coach</div>
                <div class="status">● Online — Ask me anything</div>
            </div>
        </div>

        <!-- Messages -->
        <div class="chatbox" id="chatbox">
            <div class="msg-row bot">
                <div class="msg-avatar">🤖</div>
                <div class="bubble">
                    Hello! I'm your AI Cricket Coach 🏏<br>
                    Ask me anything about batting, bowling, fielding, fitness, or the academy. Use the quick questions on the left to get started!
                </div>
            </div>
        </div>

        <!-- Input -->
        <div class="input-bar">
            <input type="text" id="message" placeholder="Ask about cricket, training, techniques..." autofocus>
            <button class="icon-btn btn-send"  onclick="sendMessage()"  title="Send">➤</button>
            <button class="icon-btn btn-voice" id="voiceBtn" onclick="toggleVoice()" title="Voice">🎤</button>
            <button class="icon-btn btn-stop"  onclick="stopSpeaking()" title="Stop">🔇</button>
        </div>

    </div>
</div>

<script>
const chatbox  = document.getElementById("chatbox");
const msgInput = document.getElementById("message");
let recognition = null, isListening = false;

/* ── helpers ── */
function scrollBottom() { chatbox.scrollTop = chatbox.scrollHeight; }

function addMsg(type, html, isTyping = false) {
    const row = document.createElement("div");
    row.className = `msg-row ${type}`;

    const av = document.createElement("div");
    av.className = "msg-avatar";
    av.innerText = type === "bot" ? "🤖" : "👤";

    const bub = document.createElement("div");
    bub.className = "bubble";

    if (isTyping) {
        bub.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
    } else {
        bub.innerHTML = html;
    }

    row.appendChild(av);
    row.appendChild(bub);
    chatbox.appendChild(row);
    scrollBottom();
    return bub;
}

/* ── send ── */
async function sendMessage(isVoice = false) {
    const msg = msgInput.value.trim();
    if (!msg) return;

    addMsg("user", msg);
    msgInput.value = "";

    const typingBub = addMsg("bot", null, true);

    try {
        const res  = await fetch("/get_response", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: msg })
        });
        const data = await res.json();
        const reply = data.response || "Sorry, I couldn't get a response.";
        typingBub.innerHTML = reply.replace(/\n/g, "<br>");
        if (isVoice) speak(reply);
    } catch {
        typingBub.innerHTML = "⚠️ Connection error. Please try again.";
    }

    scrollBottom();
}

function ask(text) { msgInput.value = text; sendMessage(); }

msgInput.addEventListener("keypress", e => { if (e.key === "Enter") sendMessage(); });

/* ── voice ── */
function toggleVoice() {
    if (isListening) { stopVoice(); return; }
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { alert("Voice input requires Chrome."); return; }

    recognition = new SR();
    recognition.lang = "en-IN";
    recognition.onstart  = () => { isListening = true;  document.getElementById("voiceBtn").classList.add("listening"); };
    recognition.onresult = e  => { msgInput.value = e.results[0][0].transcript; stopVoice(); sendMessage(true); };
    recognition.onerror  = () => stopVoice();
    recognition.onend    = () => stopVoice();
    recognition.start();
}

function stopVoice() {
    if (recognition) recognition.stop();
    isListening = false;
    document.getElementById("voiceBtn").classList.remove("listening");
}

function speak(text) {
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "en-IN"; u.rate = 1; u.pitch = 1.1;
    const v = speechSynthesis.getVoices().find(v => v.name.toLowerCase().includes("female") || v.name.toLowerCase().includes("zira"));
    if (v) u.voice = v;
    speechSynthesis.speak(u);
}

function stopSpeaking() { speechSynthesis.cancel(); }

async function clearChat() {
    stopSpeaking(); stopVoice();
    await fetch("/clear_chat");
    chatbox.innerHTML = "";
    addMsg("bot", "Chat cleared! 🤖 Ready to help. Ask me anything about cricket!");
}
</script>
</body>
</html>
