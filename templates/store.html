<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cricket Store - Elite Cricket Academy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --secondary: #3b82f6;
            --accent: #f59e0b;
            --text-dark: #1f2937;
            --text-muted: #6b7280;
            --bg-light: #f9fafb;
            --surface: #ffffff;
            --border: #e5e7eb;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f9fafb 0%, #f0fdf4 100%);
            color: var(--text-dark);
            line-height: 1.6;
            min-height: 100vh;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* Header */
        .main-header {
            background: linear-gradient(135deg, var(--surface), #f0fdf4);
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            position: sticky;
            top: 0;
            z-index: 100;
            animation: slideDown 0.6s ease-out;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .main-header nav {
            display: flex;
            gap: 32px;
            align-items: center;
        }

        .main-header nav a {
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 500;
            font-size: 14px;
            transition: all 0.3s ease;
            position: relative;
            padding: 8px 0;
        }

        .main-header nav a::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--primary);
            transition: width 0.3s ease;
        }

        .main-header nav a:hover {
            color: var(--primary);
        }

        .main-header nav a:hover::before {
            width: 100%;
        }

        /* Store Header */
        .store-header {
            text-align: center;
            padding: 60px 20px 40px;
            animation: slideDown 0.6s ease-out 0.2s both;
        }

        .store-header h1 {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
        }

        .store-header p {
            color: var(--text-muted);
            font-size: 18px;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Products Grid */
        .product-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 32px;
            padding: 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Product Card */
        .product-card {
            background: var(--surface);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            animation: slideUp 0.6s ease-out;
            animation-fill-mode: both;
        }

        .product-card:nth-child(1) { animation-delay: 0.1s; }
        .product-card:nth-child(2) { animation-delay: 0.2s; }
        .product-card:nth-child(3) { animation-delay: 0.3s; }
        .product-card:nth-child(4) { animation-delay: 0.4s; }
        .product-card:nth-child(5) { animation-delay: 0.5s; }
        .product-card:nth-child(6) { animation-delay: 0.6s; }

        .product-card:hover {
            transform: translateY(-12px) scale(1.02);
            box-shadow: 0 20px 40px rgba(16, 185, 129, 0.15);
        }

        .product-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 16px;
            margin-bottom: 16px;
            transition: all 0.3s ease;
        }

        .product-card:hover img {
            transform: scale(1.08) rotate(2deg);
            box-shadow: 0 12px 30px rgba(16, 185, 129, 0.2);
        }

        .product-card h3 {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 8px;
        }

        .price {
            color: var(--accent);
            font-size: 24px;
            font-weight: 700;
            margin: 12px 0;
            background: linear-gradient(135deg, var(--accent), #f97316);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Quantity Box */
        .qty-box {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 16px 0;
            background: var(--bg-light);
            border-radius: 12px;
            padding: 8px;
        }

        .qty-box button {
            width: 36px;
            height: 36px;
            border: none;
            background: var(--primary);
            color: white;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .qty-box button:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        .qty-input {
            width: 50px;
            text-align: center;
            padding: 8px;
            font-size: 16px;
            border: none;
            background: transparent;
            color: var(--text-dark);
            font-weight: 600;
            outline: none;
        }

        /* Add to Cart Button */
        .add-btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            width: 100%;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
            position: relative;
            overflow: hidden;
        }

        .add-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            transition: left 0.3s ease;
        }

        .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(16, 185, 129, 0.3);
        }

        .add-btn:hover::before {
            left: 100%;
        }

        @media (max-width: 768px) {
            .product-container {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 20px;
                padding: 20px;
            }

            .store-header h1 {
                font-size: 32px;
            }

            .store-header p {
                font-size: 14px;
            }

            .main-header {
                flex-direction: column;
                gap: 16px;
                padding: 12px 16px;
            }

            .main-header nav {
                gap: 16px;
            }

            .product-card img {
                height: 150px;
            }
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <header class="main-header">
        <div class="logo">
            <a href="/dashboard_user" style="text-decoration:none;">
                <img src="/static/images/logo.png" alt="Elite Cricket Academy" style="height:44px; width:auto; object-fit:contain;">
            </a>
        </div>
        <nav>
            <a href="/dashboard_user">Home</a>
            <a href="{{ url_for('cart_page') }}">🛒 Cart ({{ cart_count }})</a>
        </nav>
    </header>

    <!-- Store Title -->
    <div class="store-header">
        <h1>🏪 Premium Cricket Gear</h1>
        <p>Equip yourself with the best cricket equipment for professional performance</p>
    </div>

    <!-- PRODUCTS -->
    <div class="product-container">
        {% for product in products %}
            <div class="product-card">
                <img src="{{ url_for('static', filename=product.image) }}"
                     onerror="this.src='https://via.placeholder.com/200'">

                <h3>{{ product.name }}</h3>

                <p class="price">₹{{ product.price }}</p>

                <form action="/add_to_cart/{{ product._id }}" method="POST">
                    <div class="qty-box">
                        <button type="button" onclick="decreaseQty(this)">−</button>
                        <input type="number" name="quantity" value="1" min="1" class="qty-input">
                        <button type="button" onclick="increaseQty(this)">+</button>
                    </div>

                    <button type="submit" class="add-btn">Add to Cart ✓</button>
                </form>
            </div>
        {% endfor %}
    </div>

    {% include 'footer.html' %}

    <script>
        function increaseQty(btn) {
            let input = btn.parentElement.querySelector(".qty-input");
            input.value = parseInt(input.value) + 1;
        }

        function decreaseQty(btn) {
            let input = btn.parentElement.querySelector(".qty-input");
            let val = parseInt(input.value);
            if (val > 1) {
                input.value = val - 1;
            }
        }
    </script>
</body>
</html>
