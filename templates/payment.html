<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment - Elite Cricket Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:'Poppins',sans-serif;
            background:linear-gradient(135deg,#f9fafb,#f0fdf4);
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
        }

        .card {
            background:#fff;
            border-radius:24px;
            box-shadow:0 20px 60px rgba(16,185,129,0.12);
            padding:52px 44px;
            width:100%;
            max-width:400px;
            text-align:center;
        }

        .lock-icon {
            width:72px; height:72px;
            background:linear-gradient(135deg,#10b981,#059669);
            border-radius:50%;
            display:flex; align-items:center; justify-content:center;
            font-size:32px;
            margin:0 auto 24px;
            box-shadow:0 8px 24px rgba(16,185,129,0.35);
        }

        h2 {
            font-size:22px; font-weight:700;
            color:#1f2937; margin-bottom:8px;
        }

        .subtitle {
            font-size:14px; color:#6b7280; margin-bottom:32px;
        }

        .amount-box {
            background:linear-gradient(135deg,#10b981,#059669);
            border-radius:16px;
            padding:24px;
            margin-bottom:32px;
        }

        .amount-box .label { font-size:13px; color:rgba(255,255,255,0.8); margin-bottom:4px; }
        .amount-box .amount { font-size:42px; font-weight:800; color:#fff; }

        .pay-btn {
            width:100%;
            padding:16px;
            background:linear-gradient(135deg,#10b981,#059669);
            color:white;
            border:none;
            border-radius:14px;
            font-size:17px;
            font-weight:700;
            cursor:pointer;
            font-family:'Poppins',sans-serif;
            box-shadow:0 8px 24px rgba(16,185,129,0.35);
            transition:transform 0.2s, box-shadow 0.2s;
        }

        .pay-btn:hover {
            transform:translateY(-2px);
            box-shadow:0 14px 32px rgba(16,185,129,0.45);
        }

        .secure {
            margin-top:16px;
            font-size:12px;
            color:#9ca3af;
        }

        .back-link {
            display:block;
            margin-top:20px;
            font-size:13px;
            color:#6b7280;
            text-decoration:none;
            transition:color 0.2s;
        }
        .back-link:hover { color:#10b981; }
    </style>
</head>
<body>

<div class="card">
    <div class="lock-icon">🔒</div>
    <h2>Secure Payment</h2>
    <p class="subtitle">Your order is ready. Click below to complete payment.</p>

    <div class="amount-box">
        <div class="label">Amount to Pay</div>
        <div class="amount">₹{{ total }}</div>
    </div>

    <form method="POST" action="/payment">
        <input type="hidden" name="oid" value="{{ oid }}">
        <button type="submit" class="pay-btn">💳 Pay Now</button>
    </form>

    <p class="secure">🔐 256-bit SSL encrypted · Safe & Secure</p>
    <a href="/cart" class="back-link">← Back to Cart</a>
</div>

</body>
</html>
