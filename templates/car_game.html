<!DOCTYPE html>
<html>
<head>
<title>Car Racing Game</title>
<style>
:root {
    --accent: #1dd1a1;
    --danger: #ff4c4c;
    --panel: rgba(18,36,58,0.85);
    --text: #f8fbff;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
    overflow: hidden;
    background: #0b1d2f;
    font-family: 'Segoe UI', Arial, sans-serif;
    color: var(--text);
}
header.game-hud {
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 24px;
    background: rgba(5,23,42,0.85);
    z-index: 100;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(6px);
}
header.game-hud h1 { font-size: 18px; font-weight: 800; }
header.game-hud .instructions { font-size: 12px; color: rgba(255,255,255,0.7); }
.back-btn {
    padding: 6px 14px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    color: white;
    text-decoration: none;
    font-size: 13px;
    font-weight: 600;
    transition: background 0.2s;
}
.back-btn:hover { background: rgba(255,255,255,0.2); }
.scoreboard {
    position: fixed;
    top: 60px; left: 16px;
    background: var(--panel);
    border: 1px solid rgba(29,209,161,0.4);
    border-radius: 12px;
    padding: 10px 16px;
    z-index: 100;
    min-width: 150px;
}
.scoreboard span { display:block; font-size:15px; font-weight:700; margin-bottom:2px; }
.scoreboard small { color: rgba(255,255,255,0.7); font-size:12px; }
canvas { display:block; width:100vw; height:100vh; }
#gameOver {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    width: min(400px, 90vw);
    background: rgba(8,26,45,0.97);
    padding: 32px 28px;
    display: none;
    text-align: center;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.15);
    box-shadow: 0 20px 50px rgba(0,0,0,0.6);
    z-index: 200;
}
#gameOver h2 { font-size: 28px; color: var(--danger); margin-bottom: 10px; }
#gameOver p { font-size: 15px; color: rgba(255,255,255,0.85); margin-bottom: 20px; }
#gameOver .btn-row { display:flex; gap:12px; justify-content:center; }
#gameOver button {
    padding: 11px 22px;
    border: none;
    border-radius: 10px;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    transition: transform 0.2s, filter 0.2s;
}
#gameOver button:hover { transform: translateY(-2px); filter: brightness(1.1); }
.btn-play { background: linear-gradient(135deg, var(--accent), #0abf91); color: #052127; }
.btn-back-go { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2) !important; }
#levelBadge {
    position: fixed;
    top: 60px; right: 16px;
    background: var(--panel);
    border: 1px solid rgba(29,209,161,0.4);
    border-radius: 12px;
    padding: 10px 16px;
    z-index: 100;
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
}
</style>
</head>
<body>

<header class="game-hud">
    <h1>🏎️ Fast Track Racing</h1>
    <div class="instructions">◀ ▶ Arrow Keys to dodge • Collect 🪙 coins</div>
    <a href="/gamezone" class="back-btn">← Back</a>
</header>

<div class="scoreboard">
    <span id="score">Score: 0</span>
    <small id="coins">Coins: 0</small>
</div>

<div id="levelBadge">Level 1</div>

<div id="gameOver">
    <h2>💥 Game Over</h2>
    <p id="finalScore"></p>
    <div class="btn-row">
        <button class="btn-play" onclick="restartGame()">▶ Play Again</button>
        <button class="btn-back-go" onclick="window.location='/gamezone'">← Game Zone</button>
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const ROAD_W = Math.min(500, canvas.width * 0.7);
const ROAD_X = (canvas.width - ROAD_W) / 2;
const LANE_COUNT = 3;
const LANE_W = ROAD_W / LANE_COUNT;

let player, enemies, coins, score, coinCount, gameOver, enemySpeed, frameCount, level;

function init() {
    player = { lane: 1, x: 0, y: canvas.height - 140, w: 50, h: 90, targetX: 0 };
    updatePlayerX();
    enemies = [];
    coins = [];
    score = 0;
    coinCount = 0;
    gameOver = false;
    enemySpeed = 5;
    frameCount = 0;
    level = 1;
}

function updatePlayerX() {
    player.targetX = ROAD_X + player.lane * LANE_W + LANE_W / 2 - player.w / 2;
}

const keys = {};
document.addEventListener("keydown", e => {
    if (keys[e.key]) return;
    keys[e.key] = true;
    if (!gameOver) {
        if ((e.key === "ArrowLeft" || e.key === "a") && player.lane > 0) { player.lane--; updatePlayerX(); }
        if ((e.key === "ArrowRight" || e.key === "d") && player.lane < LANE_COUNT - 1) { player.lane++; updatePlayerX(); }
    }
});
document.addEventListener("keyup", e => keys[e.key] = false);

// Touch support
let touchStartX = 0;
canvas.addEventListener("touchstart", e => { touchStartX = e.touches[0].clientX; });
canvas.addEventListener("touchend", e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (!gameOver) {
        if (dx < -40 && player.lane > 0) { player.lane--; updatePlayerX(); }
        if (dx > 40 && player.lane < LANE_COUNT - 1) { player.lane++; updatePlayerX(); }
    }
});

const CAR_COLORS = ["#ff4c4c","#ff9f43","#ee5a24","#e84393","#9b59b6"];

function drawCar(x, y, color, isPlayer) {
    const w = 50, h = 90;
    // body
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(x, y, w, h, 8);
    ctx.fill();
    // windshield
    ctx.fillStyle = isPlayer ? "rgba(100,220,255,0.7)" : "rgba(0,0,0,0.5)";
    ctx.beginPath();
    ctx.roundRect(x + 8, y + 10, w - 16, 22, 4);
    ctx.fill();
    // wheels
    ctx.fillStyle = "#222";
    [[x - 6, y + 10], [x + w - 4, y + 10], [x - 6, y + h - 26], [x + w - 4, y + h - 26]].forEach(([wx, wy]) => {
        ctx.beginPath(); ctx.roundRect(wx, wy, 10, 16, 3); ctx.fill();
    });
    // headlights
    if (isPlayer) {
        ctx.fillStyle = "#ffe066";
        ctx.beginPath(); ctx.ellipse(x + 10, y + 6, 5, 3, 0, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(x + w - 10, y + 6, 5, 3, 0, 0, Math.PI * 2); ctx.fill();
    }
}

function drawCoin(x, y) {
    ctx.save();
    ctx.shadowColor = "gold";
    ctx.shadowBlur = 10;
    ctx.fillStyle = "#ffd700";
    ctx.beginPath();
    ctx.arc(x, y, 12, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "#ffec6e";
    ctx.beginPath();
    ctx.arc(x - 3, y - 3, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
}

function drawRoad() {
    // grass
    ctx.fillStyle = "#1a5c2a";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    // road
    ctx.fillStyle = "#3a3a3a";
    ctx.fillRect(ROAD_X, 0, ROAD_W, canvas.height);
    // lane lines
    ctx.strokeStyle = "rgba(255,255,255,0.4)";
    ctx.setLineDash([30, 20]);
    ctx.lineWidth = 3;
    for (let l = 1; l < LANE_COUNT; l++) {
        ctx.beginPath();
        ctx.moveTo(ROAD_X + l * LANE_W, 0);
        ctx.lineTo(ROAD_X + l * LANE_W, canvas.height);
        ctx.stroke();
    }
    ctx.setLineDash([]);
    // road edges
    ctx.strokeStyle = "#fff";
    ctx.lineWidth = 4;
    ctx.beginPath(); ctx.moveTo(ROAD_X, 0); ctx.lineTo(ROAD_X, canvas.height); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(ROAD_X + ROAD_W, 0); ctx.lineTo(ROAD_X + ROAD_W, canvas.height); ctx.stroke();
}

function collides(ax, ay, aw, ah, bx, by, bw, bh) {
    return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
}

function gameLoop() {
    if (gameOver) return;
    requestAnimationFrame(gameLoop);
    frameCount++;

    // level up every 300 frames
    level = 1 + Math.floor(frameCount / 300);
    enemySpeed = 5 + level * 0.8;
    document.getElementById("levelBadge").innerText = "Level " + level;

    drawRoad();

    // smooth player movement
    player.x += (player.targetX - player.x) * 0.18;

    drawCar(player.x, player.y, "#3498db", true);

    // enemies
    for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];
        e.y += enemySpeed;
        drawCar(e.x, e.y, e.color, false);
        if (collides(player.x, player.y, player.w, player.h, e.x, e.y, 50, 90)) { endGame(); return; }
        if (e.y > canvas.height) { enemies.splice(i, 1); score++; }
    }

    // coins
    for (let i = coins.length - 1; i >= 0; i--) {
        const c = coins[i];
        c.y += 4;
        drawCoin(c.x, c.y);
        if (collides(player.x, player.y, player.w, player.h, c.x - 12, c.y - 12, 24, 24)) {
            coins.splice(i, 1); coinCount++; score += 3;
        } else if (c.y > canvas.height) { coins.splice(i, 1); }
    }

    // spawn
    const spawnRate = Math.max(0.015, 0.035 - level * 0.002);
    if (Math.random() < spawnRate) {
        const lane = Math.floor(Math.random() * LANE_COUNT);
        enemies.push({
            x: ROAD_X + lane * LANE_W + LANE_W / 2 - 25,
            y: -100,
            color: CAR_COLORS[Math.floor(Math.random() * CAR_COLORS.length)]
        });
    }
    if (Math.random() < 0.018) {
        const lane = Math.floor(Math.random() * LANE_COUNT);
        coins.push({ x: ROAD_X + lane * LANE_W + LANE_W / 2, y: -20 });
    }

    document.getElementById("score").innerText = "Score: " + score;
    document.getElementById("coins").innerText = "🪙 " + coinCount;
}

function endGame() {
    gameOver = true;
    document.getElementById("finalScore").innerText = "Score: " + score + "  |  Coins: " + coinCount + "  |  Level: " + level;
    document.getElementById("gameOver").style.display = "block";
}

function restartGame() {
    document.getElementById("gameOver").style.display = "none";
    init();
    gameLoop();
}

init();
gameLoop();
</script>
</body>
</html>
